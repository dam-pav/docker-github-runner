services:
  github-runner:
    image: ghcr.io/dam-pav/github-runner:${RUNNER_IMAGE_TAG:-windows-ltsc2022-latest}
    build:
      context: ./windows
      dockerfile: Dockerfile
      args:
        WINDOWS_VERSION: ${WINDOWS_VERSION:-ltsc2022}
    deploy:
      replicas: ${RUNNER_INSTANCES:-1}
    depends_on:
      - runner-cleanup
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER:-false}"
      - "${CUSTOM_LABEL:-foo=bar}"

    environment:
      REPO_URL: ${REPO_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      RUNNER_NAME: ${RUNNER_NAME}
      RUNNER_INSTANCES: ${RUNNER_INSTANCES:-1}
      RUNNER_LABELS: ${RUNNER_LABELS:-}
      RUNNER_GROUP: ${RUNNER_GROUP:-}
      RUNNER_IMAGE: ghcr.io/dam-pav/github-runner:${RUNNER_IMAGE_TAG:-windows-ltsc2022-latest}
      VALIDATE_NESTED_DOCKER_MOUNTS: ${VALIDATE_NESTED_DOCKER_MOUNTS:-true}
      GH_API_RETRIES: ${GH_API_RETRIES:-6}
      GH_API_INITIAL_DELAY: ${GH_API_INITIAL_DELAY:-1}
      GH_API_BACKOFF_MULT: ${GH_API_BACKOFF_MULT:-2}

    volumes:
      - type: npipe
        source: '\\.\pipe\docker_engine'
        target: '\\.\pipe\docker_engine'
      # BcContainerHelper passes runner paths to the host Docker daemon. Mount
      # the parent identically so every scaled runner gets an isolated subfolder.
      - "C:/actions-runner/_work:C:/actions-runner/_work"
      - "C:/ProgramData/BcContainerHelper:C:/ProgramData/BcContainerHelper"
      - "${HOST_CRED_LOCATION:-C:/ProgramData/github-runner}:C:/run/secrets:ro"

    restart: unless-stopped
    stop_grace_period: 1m

  runner-cleanup:
    image: ghcr.io/dam-pav/github-runner:${RUNNER_IMAGE_TAG:-windows-ltsc2022-latest}
    build:
      context: ./windows
      dockerfile: Dockerfile
      args:
        WINDOWS_VERSION: ${WINDOWS_VERSION:-ltsc2022}
    deploy:
      replicas: ${RUNNER_INSTANCES:-1}
    entrypoint:
      - C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
      - -NoLogo
      - -NoProfile
      - -ExecutionPolicy
      - Bypass
      - -File
      - C:\cleanup-monitor.ps1
    environment:
      REPO_URL: ${REPO_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      RUNNER_NAME: ${RUNNER_NAME}
      RUNNER_INSTANCES: ${RUNNER_INSTANCES:-1}
    volumes:
      - type: npipe
        source: '\\.\pipe\docker_engine'
        target: '\\.\pipe\docker_engine'
      - "${HOST_CRED_LOCATION:-C:/ProgramData/github-runner}:C:/run/secrets:ro"
    restart: unless-stopped
