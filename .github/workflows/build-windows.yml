name: Build Windows GitHub Runner Bootstrap Image

on:
  push:
    branches: ["**"]
    paths:
      - windows/**
      - windows-compose.yml
      - .github/workflows/build-windows.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker is running
        shell: powershell
        run: |
          if ((Get-Service docker).Status -ne 'Running') {
            Start-Service docker
          }
          docker version

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        shell: powershell
        env:
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          $branchName = $env:REF_NAME.ToLowerInvariant() -replace '[^a-z0-9_.-]', '-'
          $branchName = $branchName -replace '-+', '-'
          "SHA_TAG=ghcr.io/dam-pav/github-runner:windows-ltsc2022-${{ github.sha }}" >> $env:GITHUB_ENV
          "BRANCH_TAG=ghcr.io/dam-pav/github-runner:windows-ltsc2022-branch-$branchName" >> $env:GITHUB_ENV
          "IS_DEFAULT_BRANCH=$($env:REF_NAME -eq $env:DEFAULT_BRANCH)" >> $env:GITHUB_ENV

      - name: Build Windows image
        shell: powershell
        working-directory: windows
        run: |
          $arguments = @(
            'build', '--file', 'Dockerfile',
            '--tag', $env:SHA_TAG,
            '--tag', $env:BRANCH_TAG
          )
          if ($env:IS_DEFAULT_BRANCH -eq 'True') {
            $arguments += @('--tag', 'ghcr.io/dam-pav/github-runner:windows-ltsc2022-latest')
          }
          $arguments += '.'
          & docker @arguments
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify required tools
        shell: powershell
        run: |
          docker run --rm `
            --entrypoint C:\PowerShell\pwsh.exe `
            $env:SHA_TAG `
            -NoLogo -NoProfile -Command 'if ($PSVersionTable.PSVersion.Major -lt 7) { exit 1 }'
          docker run --rm `
            --entrypoint C:\MinGit\cmd\git.exe `
            $env:SHA_TAG `
            lfs version

      - name: Push Windows image
        shell: powershell
        run: |
          docker push $env:SHA_TAG
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          docker push $env:BRANCH_TAG
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($env:IS_DEFAULT_BRANCH -eq 'True') {
            docker push ghcr.io/dam-pav/github-runner:windows-ltsc2022-latest
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
