name: Build Windows GitHub Runner Bootstrap Image

on:
  push:
    branches: [main]
    paths:
      - windows/**
      - windows-compose.yml
      - .github/workflows/build-windows.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker is running
        shell: powershell
        run: |
          if ((Get-Service docker).Status -ne 'Running') {
            Start-Service docker
          }
          docker version

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows image
        shell: powershell
        working-directory: windows
        run: |
          docker build --file Dockerfile `
            --tag ghcr.io/dam-pav/github-runner:windows-ltsc2022-latest `
            --tag ghcr.io/dam-pav/github-runner:windows-ltsc2022-${{ github.sha }} `
            .

      - name: Verify PowerShell 7
        shell: powershell
        run: |
          docker run --rm `
            --entrypoint C:\PowerShell\pwsh.exe `
            ghcr.io/dam-pav/github-runner:windows-ltsc2022-${{ github.sha }} `
            -NoLogo -NoProfile -Command 'if ($PSVersionTable.PSVersion.Major -lt 7) { exit 1 }'

      - name: Push Windows image
        shell: powershell
        run: |
          docker push ghcr.io/dam-pav/github-runner:windows-ltsc2022-latest
          docker push ghcr.io/dam-pav/github-runner:windows-ltsc2022-${{ github.sha }}
