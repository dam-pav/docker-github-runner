name: Build Linux GitHub Runner Bootstrap Image

on:
  push:
    branches: [ main ]
    paths:
      - linux/**
      - linux-compose.yml
      - .github/workflows/build-linux.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./linux
          push: true
          tags: |
            ghcr.io/dam-pav/github-runner:linux-latest
            ghcr.io/dam-pav/github-runner:linux-${{ github.sha }}
            ghcr.io/dam-pav/github-runner:latest
